<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paint-online</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fff; font-family: Arial, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; cursor: crosshair; z-index: 1; }
        
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; gap: 20px; align-items: center; z-index: 10; user-select: none; }
        .tool-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #333; font-weight: bold; }
        input[type="color"] { border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; background: none; }
        input[type="range"] { cursor: pointer; width: 100px; }
        #nickInput { border: 1px solid #ccc; border-radius: 10px; padding: 4px 8px; width: 100px; font-size: 13px; font-weight: bold; color: #007bff; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; border-radius: 20px; background-color: #dc3545; color: white; font-weight: bold; transition: background 0.2s, transform 0.1s; }
        button:hover { background-color: #bd2130; }
        
        #author-tag {
            position: fixed; padding: 5px 10px; background: rgba(0, 0, 0, 0.8); color: white; border-radius: 5px;
            font-size: 12px; pointer-events: none; display: none; z-index: 100; font-weight: bold;
        }
    </style>
    <!-- Подключаем библиотеку сокетов через стабильный CDN -->
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body>

    <div id="toolbar">
        <div class="tool-group">
            <label for="nickInput">Ваш ник:</label>
            <input type="text" id="nickInput" value="">
        </div>
        <div class="tool-group">
            <label for="colorPicker">Цвет</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="tool-group">
            <label for="lineWidth">Толщина</label>
            <input type="range" id="lineWidth" min="1" max="30" value="5">
        </div>
        <button id="clearBtn">Очистить ВСЁ</button>
    </div>

    <div id="author-tag">Рисовал: Кто-то</div>
    <canvas id="paintCanvas"></canvas>

    <script>
        // Автоматически генерируем случайный никнейм без всплывающих окон
        const nickInput = document.getElementById('nickInput');
        nickInput.value = "User_" + Math.floor(Math.random() * 900 + 100);

        // Безопасное подключение к серверу сокетов
        const socket = io('https://onrender.com', {
            transports: ['websocket']
        });

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidthInput = document.getElementById('lineWidth');
        const clearBtn = document.getElementById('clearBtn');
        const authorTag = document.getElementById('author-tag');

        let isDrawing = false;
        let lastX = 0; let lastY = 0;
        let linesMemory = [];

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Фиксируем холст по размеру окна один раз при старте
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Получаем старые рисунки с сервера
        socket.on('canvas_state', (history) => {
            if (history && Array.isArray(history)) {
                linesMemory = history;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                linesMemory.forEach(line => drawSegment(line));
            }
        });

        // Слушаем линии от друзей
        socket.on('draw_line', (data) => {
            linesMemory.push(data);
            drawSegment(data);
        });

        // Слушаем команду очистки
        socket.on('clear_canvas', () => {
            linesMemory = [];
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        function drawSegment(data) {
            ctx.beginPath();
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.moveTo(data.x0, data.y0);
            ctx.lineTo(data.x1, data.y1);
            ctx.stroke();
            ctx.closePath();
        }

        function getCoords(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches.clientX, y: e.touches.clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoords(e);
            [lastX, lastY] = [coords.x, coords.y];
        }

        function draw(e) {
            const coords = getCoords(e);
            checkAuthor(coords.x, coords.y);

            if (!isDrawing) return;
            if (e.type === 'touchmove') e.preventDefault();

            const drawData = {
                x0: lastX, y0: lastY,
                x1: coords.x, y1: coords.y,
                color: colorPicker.value,
                size: lineWidthInput.value,
                author: nickInput.value
            };

            linesMemory.push(drawData);
            drawSegment(drawData);
            socket.emit('draw_line', drawData);

            [lastX, lastY] = [coords.x, coords.y];
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                socket.emit('save_canvas', linesMemory);
            }
        }

        function checkAuthor(mx, my) {
            if (linesMemory.length === 0) return;
            
            let foundLine = linesMemory.find(line => {
                const distance = Math.abs((line.y1 - line.y0) * mx - (line.x1 - line.x0) * my + line.x1 * line.y0 - line.y1 * line.x0) / 
                                 Math.sqrt(Math.pow(line.y1 - line.y0, 2) + Math.pow(line.x1 - line.x0, 2));
                return distance < (parseInt(line.size) / 2 + 5) && 
                       mx >= Math.min(line.x0, line.x1) - 5 && mx <= Math.max(line.x0, line.x1) + 5 &&
                       my >= Math.min(line.y0, line.y1) - 5 && my <= Math.max(line.y0, line.y1) + 5;
            });

            if (foundLine) {
                authorTag.style.display = 'block';
                authorTag.style.left = (mx + 15) + 'px';
                authorTag.style.top = (my + 15) + 'px';
                authorTag.innerText = "Рисовал: " + foundLine.author;
            } else {
                authorTag.style.display = 'none';
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', () => { isDrawing = false; authorTag.style.display = 'none'; });

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        clearBtn.addEventListener('click', () => { socket.emit('clear_canvas'); });
    </script>
</body>
</html>
